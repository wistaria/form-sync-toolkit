title: アンケート
description: 今後の業務改善の参考にするためのアンケートです
path: /Forms/業務アンケート

questions:
  - title: 年齢を教えてください
    required: true
    type: radio
    options:
      - 20歳未満
      - 20-30歳
      - 31-40歳
      - 41-50歳
      - 51歳以上
    shuffle: false

  - title: 業務で使用しているツールは何ですか？（複数選択可）
    required: true
    type: checkbox
    options:
      - Excel
      - Google Sheets
      - Slack
      - Microsoft Teams
      - その他
    shuffle: false

  - title: ご意見があればご記入ください
    required: false
    type: paragraph
