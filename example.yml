title: アンケート
description: 今後の業務改善の参考にするためのアンケートです
path: /Forms/業務アンケート

questions:
  - title: 年齢を教えてください
    type: radio
    required: true
    options:
      - 20歳未満
      - 20-30歳
      - 31-40歳
      - 41-50歳
      - 51歳以上

  - title: 業務で使用しているツールは何ですか？（複数選択可）
    type: checkbox
    required: true
    options:
      - Excel
      - Google Sheets
      - Slack
      - Microsoft Teams
      - その他

  - title: ご意見があればご記入ください
    type: paragraph
    required: false
    placeholder: 例）業務の効率化のために、もっと自動化ツールを導入してほしいです
